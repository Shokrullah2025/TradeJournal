<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // tradgella.com is the retired brand domain, but the old Cloudflare
      // Pages binding still answers for visitors with stale DNS or old
      // bookmarks. Bounce them to zalortrade.com keeping path, query, AND
      // hash — the hash carries Supabase auth tokens (password recovery,
      // email confirmation), so in-flight links keep working across the hop.
      (function () {
        if (/(^|\.)tradgella\.com$/i.test(window.location.hostname)) {
          window.location.replace(
            "https://zalortrade.com" +
              window.location.pathname +
              window.location.search +
              window.location.hash
          );
        }
      })();
    </script>
    <!-- ?v=2 busts stale favicon caches from the pre-rebrand logo — browsers
         cache tab icons aggressively and ignore normal reloads. Bump the
         version whenever the brand mark changes. -->
    <link rel="icon" type="image/png" sizes="256x256" href="/logo.png?v=2" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="48x48 32x32 16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO baseline.
         NOTE: per-page <title>, description, canonical, and robots are owned at
         runtime by react-helmet-async (see src/components/seo/Seo.jsx) so each
         route gets its own values. Those page-specific tags are intentionally
         NOT hardcoded here — duplicating them would create conflicting canonical
         tags and shadow the per-page description for crawlers that run JS.
         The og:/twitter: block below is a site-level fallback so JS-blind social
         crawlers (Facebook, LinkedIn, Slack, Discord) still get a branded
         preview card; JS-running crawlers (Googlebot) read the per-page tags.
         The seo:fallback markers bound the block scripts/prerender.mjs REPLACES
         with each page's helmet tags in the prerendered dist/<route>/index.html
         files — do not remove them, and keep every fallback tag inside them. -->
    <meta name="theme-color" content="#158477" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- seo:fallback:start -->
    <title>ZalorTrade — Trading Journal & Analytics for Serious Traders</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZalorTrade" />
    <meta
      property="og:title"
      content="ZalorTrade — Trading Journal & Analytics for Serious Traders"
    />
    <meta
      property="og:description"
      content="Auto-sync your broker, journal every trade, and turn your track record into real, measurable analytics."
    />
    <meta property="og:url" content="https://zalortrade.com/" />
    <meta property="og:image" content="https://zalortrade.com/og-image.jpg" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@zalortrade" />
    <meta
      name="twitter:title"
      content="ZalorTrade — Trading Journal & Analytics for Serious Traders"
    />
    <meta
      name="twitter:description"
      content="Auto-sync your broker, journal every trade, and turn your track record into real, measurable analytics."
    />
    <meta name="twitter:image" content="https://zalortrade.com/og-image.jpg" />
    <!-- seo:fallback:end -->

    <!-- Structured data: the product/organisation. Helps Google understand the
         brand and can power rich results. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ZalorTrade",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://zalortrade.com/",
        "description": "A data-driven trading journal with broker auto-sync, performance analytics, backtesting, and risk management.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
